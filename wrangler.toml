# Cloudflare Pages — static site (Astro build → dist).
# Wrangler 4.x+ requires pages_build_output_dir for `wrangler pages deploy dist` to use this file.
# Project name (below) must match your Pages project in the Cloudflare dashboard, or use:
#   npx wrangler pages deploy dist --project-name=YOUR_ACTUAL_PROJECT_NAME
#
name = "grok"
compatibility_date = "2026-03-06"
pages_build_output_dir = "dist"

[vars]
# Add your HighLevel Custom Field IDs here
# You can find these in HighLevel > Settings > Custom Fields
HIGHLEVEL_CUSTOM_FIELD_PROJECT_DESCRIPTION = "cVY04IeJOEfpC42bqury"
HIGHLEVEL_CUSTOM_FIELD_QUOTE_IMAGE = "4umRt0qz4rRZPDhjVQAD"
HIGHLEVEL_LOCATION_ID = "tV8qFLdWkBLBfjh64cFV"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "img"
